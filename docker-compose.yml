services:

  harvester:
    build: .
    command: ./build/src/harvester/polymarket_harvester
    environment:
      - POLYMARKET_MARKET_FILTER=${POLYMARKET_MARKET_FILTER:-Bitcoin}
      - POLYMARKET_DATA_DIR=/data
    volumes:
      - ./data:/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  espn_collector:
    image: python:3.12-slim
    command: >
      python3 /app/scripts/collectors/espn_collector.py
      --sport ${ESPN_SPORT:-soccer/fifa.world}
      --event ${ESPN_EVENT_ID:?set ESPN_EVENT_ID to the ESPN game id}
      --out /data/espn_${ESPN_EVENT_ID}.csv
      --interval 1.0
    volumes:
      - ./scripts:/app/scripts:ro
      - ./data:/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
